<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadarScript Compiler | ejemplo.rdr</title>
    <style>
        :root {
            color-scheme: dark;
            --fondo: #07111f;
            --panel: #0b1730;
            --borde: #143354;
            --acento: #00c8ff;
            --texto: #d9f3ff;
            --texto-suave: #82a9bb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(0, 200, 255, 0.18), transparent 32%),
                linear-gradient(180deg, #07111f 0%, #040a14 100%);
            color: var(--texto);
            font-family: "Segoe UI", sans-serif;
        }

        main {
            width: min(980px, calc(100% - 32px));
            margin: 32px auto;
            padding: 24px;
            border: 1px solid var(--borde);
            border-radius: 20px;
            background: rgba(11, 23, 48, 0.94);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.9rem;
        }

        p {
            margin: 0 0 20px;
            color: var(--texto-suave);
        }

        pre {
            margin: 0;
            padding: 20px;
            overflow: auto;
            border-radius: 16px;
            border: 1px solid var(--borde);
            background: #030813;
            color: #aef7ff;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .badge {
            display: inline-block;
            margin-bottom: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(0, 200, 255, 0.12);
            color: var(--acento);
            border: 1px solid rgba(0, 200, 255, 0.28);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main>
        <span class="badge">Resultado ejecutado</span>
        <h1>ejemplo.rdr</h1>
        <p>Este archivo HTML puede abrirse con doble clic y muestra solo la salida final del programa.</p>
        <pre>ALERTA: Tormenta detectada en NORTE
REPORTE: Proceso finalizado</pre>
    </main>
</body>
</html>
